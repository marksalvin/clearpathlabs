<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clearpath Labs Ltd</title>
    <meta name="description" content="Clearpath Labs Ltd - Building clarity from complexity. UK-based software company building data infrastructure products.">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='12' fill='%23111'/><text x='50' y='68' font-family='system-ui' font-size='56' font-weight='600' fill='white' text-anchor='middle'>CL</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            color: #e0e0e0;
            font-family: 'Space Grotesk', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
        }

        main {
            flex: 1;
            display: flex;
            align-items: center;
            padding: 4rem 2rem;
        }

        .container {
            width: 100%;
            max-width: 640px;
            margin: 0 auto;
        }

        h1 {
            font-size: 2.75rem;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: -0.02em;
            line-height: 1.1;
            margin-bottom: 0.75rem;
        }

        .tagline {
            font-size: 1.125rem;
            color: #666;
            font-weight: 400;
            margin-bottom: 3rem;
        }

        .divider {
            height: 1px;
            background: #1a1a1a;
            margin-bottom: 2.5rem;
        }

        .section-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #444;
            font-weight: 500;
            margin-bottom: 0.75rem;
        }

        .section {
            margin-bottom: 2.25rem;
        }

        .product-link {
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            color: #e0e0e0;
            text-decoration: none;
            font-size: 1rem;
            font-weight: 500;
            transition: color 0.2s ease;
        }

        .product-link:hover {
            color: #a78bfa;
        }

        .badge {
            font-size: 0.625rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #7c3aed;
            background: rgba(124, 58, 237, 0.1);
            padding: 0.25rem 0.625rem;
            border-radius: 999px;
            font-weight: 600;
        }

        .contact-link {
            color: #888;
            text-decoration: none;
            font-size: 1rem;
            transition: color 0.2s ease;
        }

        .contact-link:hover {
            color: #a78bfa;
        }

        footer {
            padding: 2rem;
            text-align: center;
        }

        .footer-text {
            font-size: 0.8125rem;
            color: #333;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 2rem;
            }

            main {
                padding: 3rem 1.5rem;
                align-items: flex-start;
                padding-top: 6rem;
            }
        }
    </style>
</head>
<body>
    <main>
        <div class="container">
            <h1>Clearpath Labs Ltd</h1>
            <p class="tagline">Building clarity from complexity.</p>

            <div class="divider"></div>

            <div class="section">
                <p class="section-label">Products</p>
                <a href="https://snapaddress.io" class="product-link">
                    SnapAddress.io
                    <span class="badge">Coming soon</span>
                </a>
            </div>

            <div class="section">
                <p class="section-label">Contact</p>
                <a href="mailto:mark@clearpathlabs.co.uk" class="contact-link">mark@clearpathlabs.co.uk</a>
            </div>
        </div>
    </main>

    <footer>
        <p class="footer-text">Clearpath Labs Ltd, registered in England and Wales, company number [NUM]</p>
    </footer>
</body>
</html>
